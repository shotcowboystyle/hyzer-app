name: HyzerApp

options:
  bundleIdPrefix: com.shotcowboystyle
  createIntermediateGroups: true
  groupSortPosition: top
  deploymentTarget:
    iOS: "18.0"
    watchOS: "11.0"

packages:
  HyzerKit:
    path: HyzerKit

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_TESTABILITY: YES
    DEVELOPMENT_TEAM: S4729REPN5
    CODE_SIGN_STYLE: Automatic
  configs:
    Debug:
      GCC_PREPROCESSOR_DEFINITIONS:
        - "DEBUG=1"
        - "$(inherited)"
    Release:
      VALIDATE_PRODUCT: YES

targets:
  HyzerApp:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - HyzerApp
    dependencies:
      - package: HyzerKit
        product: HyzerKit
      - target: HyzerWatch
    info:
      path: HyzerApp/App/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        ITSAppUsesNonExemptEncryption: false
        UIBackgroundModes:
          - remote-notification
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIUserInterfaceStyle: Dark
        NSLocalNetworkUsageDescription: "Hyzer uses your local network to discover other Hyzer players' active rounds nearby — so your group's round appears instantly without waiting for a server push."
        NSBonjourServices:
          - _hyzer-rounds._tcp
        NSMicrophoneUsageDescription: "Hyzer uses your microphone to record disc golf scores when you speak them aloud during a round."
        NSSpeechRecognitionUsageDescription: "Hyzer recognizes scores on-device from your voice. Audio is not sent to a server."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shotcowboystyle.hyzerapp
        CODE_SIGN_ENTITLEMENTS: HyzerApp/App/HyzerApp.entitlements
        CURRENT_PROJECT_VERSION: 2
        MARKETING_VERSION: "0.1.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
    preBuildScripts:
      - script: |
          if which swiftlint > /dev/null; then
            swiftlint
          fi
        name: SwiftLint
        showEnvVars: false
        basedOnDependencyAnalysis: false

  HyzerWatch:
    type: application
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - HyzerWatch
    dependencies:
      - package: HyzerKit
        product: HyzerKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shotcowboystyle.hyzerapp.watchkitapp
        CODE_SIGN_ENTITLEMENTS: HyzerWatch/App/HyzerWatch.entitlements
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleIconName: AppIcon
        INFOPLIST_KEY_WKWatchKitApp: YES
        CURRENT_PROJECT_VERSION: 2
        MARKETING_VERSION: "0.1.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.shotcowboystyle.hyzerapp
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/Frameworks @executable_path/../../Frameworks"

  HyzerAppTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - HyzerAppTests
    dependencies:
      - target: HyzerApp
      # HyzerKit is reached transitively via the HyzerApp host (which already
      # links HyzerKit). Listing `product: HyzerKit` here in addition would
      # double-link HyzerKit into HyzerAppTests.xctest (once via the SPM
      # PackageFramework, once embedded in the test bundle), causing
      # `Class _TtC8HyzerKit... is implemented in both ...` duplicate-class
      # warnings and a signal-trap crash at test bootstrap. Story 15.2 / PR #104
      # surfaced this when CI started reporting real signal.
      - package: HyzerKit
        product: TestSupport
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shotcowboystyle.hyzerapp.tests
        GENERATE_INFOPLIST_FILE: YES
