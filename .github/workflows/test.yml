name: Tests

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

env:
  # macos-15 runner image (as of 2026-05-19) ships Xcode 16.0–16.4 and
  # 26.0–26.3, but only iOS simulator runtimes 18.5, 18.6, and 26.0–26.2.
  # Xcode 16.2's iOS 18.2 SDK has no matching runtime, so xcodebuild
  # rejects every destination. Xcode 26.2 + iOS 26.2 runtime is the
  # exact-match pairing the runner can satisfy.
  XCODE_VERSION: '26.2'

jobs:
  swiftlint:
    name: SwiftLint
    runs-on: macos-15
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --reporter github-actions-logging

  hyzerkit-tests:
    name: HyzerKit Tests (swift test)
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app

      - name: Cache SPM packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            HyzerKit/.build
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('HyzerKit/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Resolve packages
        run: swift package --package-path HyzerKit resolve

      - name: Run HyzerKit tests
        run: |
          set -o pipefail
          swift test --package-path HyzerKit 2>&1 | tee hyzerkit-test-output.txt

      - name: Upload test output on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: hyzerkit-test-output
          path: hyzerkit-test-output.txt
          retention-days: 7

  app-tests:
    name: HyzerApp ViewModel Tests (xcodebuild)
    runs-on: macos-15
    timeout-minutes: 30
    needs: hyzerkit-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Cache SPM packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: ${{ runner.os }}-xcode-spm-${{ hashFiles('HyzerKit/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-xcode-spm-

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Find simulator
        id: sim
        run: |
          DEVICE_ID=$(xcrun simctl list devices available -j \
            | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          for r,devs in sorted(d['devices'].items(),reverse=True):
            if 'iOS' in r:
              for x in devs:
                if x['isAvailable'] and 'iPhone' in x['name']:
                  print(x['udid']); sys.exit(0)
          ")
          echo "device_id=$DEVICE_ID" >> "$GITHUB_OUTPUT"
          xcrun simctl boot "$DEVICE_ID" || true

      - name: Run HyzerApp tests
        # NOTE on code signing for the simulator:
        # The prior `CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO`
        # triple disabled code signing entirely, which silently strips
        # entitlements from the simulator build. HyzerApp needs
        # `com.apple.developer.icloud-services` at runtime (CloudKit container)
        # — without it, `CKContainer` errors and the test host signal-traps
        # before tests run (Story 15.2 layer-6 bootstrap-crash deferred-work
        # entry). Switch to ad-hoc signing (`CODE_SIGN_IDENTITY=-`, the "Sign
        # to Run Locally" identity) so the simulator build still receives the
        # entitlements without requiring a real Apple Development certificate
        # on the runner.
        run: |
          set -o pipefail
          xcodebuild test \
            -project HyzerApp.xcodeproj \
            -scheme HyzerApp \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.device_id }}" \
            -resultBundlePath TestResults.xcresult \
            -enableCodeCoverage YES \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            2>&1 | tee xcodebuild-test-output.txt

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: app-test-results
          path: |
            TestResults.xcresult
            xcodebuild-test-output.txt
          retention-days: 7

      - name: Upload xcresult bundle
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: test-xcresult
          path: TestResults.xcresult
          retention-days: 30
